
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> naijabuyer.html </title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <link href="bootstrap/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* STABILIZER: Locks horizontal viewport scaling to fix mobile device shaking */
        html, body {
            max-width: 100%;
            overflow-x: hidden;
        }
        /* STYLED BACKGROUND: Inherited identical setup matching your main landing index */
        body { 
            font-family: Arial, sans-serif; 
            background-image: url('back2.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            padding: 15px; 
        }
        
        @media(min-width: 768px) {
            body { padding: 30px; }
        }

        /* DARKENED CONTAINER FRAME: Semi-transparent charcoal wash for maximum text contrast */
        .form-container { 
            width: 100%;
            max-width: 750px; 
            margin: auto; 
            background-color: rgba(25, 25, 25, 0.85); /* Rich dark tint to make text pop */
            backdrop-filter: blur(8px); /* Optional modern blur effect over the underlying body background */
            -webkit-backdrop-filter: blur(8px);
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5); 
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        @media(min-width: 768px) {
            .form-container { padding: 35px; }
        }

        h2 { 
            color: #e67e22; 
            border-bottom: 2px solid #e67e22; 
            padding-bottom: 10px; 
            margin-bottom: 25px; 
            font-weight: bold;
        }
        
        .section-title { 
            font-weight: bold; 
            color: orange; 
            margin-top: 25px; 
            font-size: 1.15rem; 
        }
        
        /* RESPONSIVE LAYOUT ENGINE: Cascades to 1 fluid column on mobile screens, grids into 2 on tablet/desktop */
        .form-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 15px; 
            margin-bottom: 15px; 
        }
        
        @media (min-width: 576px) {
            .form-grid {
                grid-template-columns: 1fr 1fr;
                gap: 20px;
            }
        }
        
        .form-group { display: flex; flex-direction: column; margin-bottom: 5px; }
        
        /* Theme font mappings matching first template */
        label { 
            margin-bottom: 6px; 
            font-size: 0.95rem; 
            color: white; 
            font-weight: bold;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }
        
        input, select, textarea { 
            padding: 10px; 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 6px; 
            font-size: 1rem; 
            width: 100%; 
            box-sizing: border-box; 
            background-color: rgba(255, 255, 255, 0.95) !important;
            color: #111 !important;
        }
        
        input[readonly] {
            background-color: rgba(200, 200, 200, 0.85) !important;
            color: #333 !important;
        }
        
        @media (min-width: 576px) {
            .full-width { grid-column: span 2; }
        }

        /* SWAP BUTTON STYLE: Styled to match index buttons */
        button { 
            background: #e67e22; 
            color: white; 
            padding: 12px 25px; 
            border: none; 
            text-decoration: none; 
            text-align: center;
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 1rem; 
            width: 100%; 
            box-sizing: border-box;
            font-weight: bold;
            transition: background 0.2s ease, transform 0.2s ease;
        }
        button:hover { 
            background: #d35400; 
        }
        
        button a {
            color: white;
            text-decoration: none;
            display: block;
            width: 100%;
        }
        button a:hover {
            color: white;
        }

        .error { font-weight: bold; text-align: center; margin-bottom: 15px; }
        .congrat { color: #e67e22; font-weight: bold; text-align: center; font-size: 1.3rem; margin-bottom: 15px; }
        
        .success-box {
            max-width: 500px;
            margin: 40px auto;
            background-color: rgba(25, 25, 25, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>

    <form method="post">
        <div class="form-container">
            <h2>Car Swap Application</h2>
            
            
            <p class="section-title">1. Contact Information</p>
            <div class="form-grid">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" name="username" class="form-control" readonly>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" readonly>
                </div>
            </div>
            
            <p class="section-title">2. Your Current Vehicle (For Trade-In)</p>
            <div class="form-grid">
                <div class="form-group">
                    <label>My-Model</label>
                    <input type="text" id="mymodel" name="mymodel" class="form-control" required placeholder="e.g. Toyota Camry">
                </div>
                <div class="form-group">
                    <label>Year</label>
                    <input type="number" id="year" name="year" class="form-control" required placeholder="e.g. 2018">
                </div>
            </div>
            
            <p class="section-title">3. Vehicle You Want to Acquire</p>
            <div class="form-grid">
                <div class="form-group">
                    <label>Desired Car</label>
                    <input type="text" id="desiredmodel" name="desiredmodel" class="form-control" readonly>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" name="password" class="form-control" maxlength="15" required placeholder="Enter account password">
                </div>
                <div class="form-group full-width">
                    <label>Additional Notes (Condition, Modifications, etc.)</label>
                    <textarea name="notes" rows="4" placeholder="Mention any specific features or defects..." class="form-control"> </textarea>
                </div>
            </div>
            
            <input type="hidden" name="car_id">
            <div style="margin-top: 20px;">
                <button type="submit" class="index.html search-btn mt-2" name="submit-swap">Submit</button>
            </div>
        </div>
    </form>


<script src="bootstrap/js/bootstrap.bundle.min.js"> </script>
</body>
</html>
