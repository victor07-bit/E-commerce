<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Swap</title>
    <!-- CSS Dependencies -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css.css">
    <link rel="stylesheet" href="style.css">


     <style>
        html, body {
            max-width: 100%;
            overflow-x: hidden; /* STABILIZER: Stops any viewport shaking or horizontal shifting */
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }
        .text{
            color:white;
        }
        /* RESPONSIVE NAVBAR */
        .navbar {
            background: #333;
            color: white;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .p{
            color:white;
        }

        .navbar ul {
            list-style: none;
            display: flex;
            text-decoration:none;
            margin: 0;
            padding: 0;
            flex-wrap: wrap;
            align-items: center;
        }

        .navbar li { margin-left: 20px; }

        /* Styled Navigation Links */
        .navbar ul.nav-links li a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 4px;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* Hover Effect for Links */
        .navbar ul.nav-links li a:hover {
            background: rgba(230, 126, 34, 0.2);
            color: #e67e22;
        }

        @media (max-width: 576px) {
            .navbar {
                flex-direction: column;
                text-align: center;
            }
            .navbar ul {
                justify-content: center;
                width: 100%;
            }
            .navbar li {
                margin: 5px 10px;
            }
        }

        /* RESPONSIVE CAR CARDS & GRID */
        .cards-grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 20px;
            width: 100%;
            padding: 0 15px;
        }

        .car-card {
            background-image:url('back2.jpg');
            text:white;
            width: 100%;
            max-width: 320px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin: 0 auto 20px auto;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            padding-bottom: 15px;
        }
        .logo { 
            font-weight: bold; 
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logi {
            width: 40px;
            height: auto;
        }
        .car-card img { width: 100%; height: 150px; object-fit: cover; }

        .swap-btn {
            background: #e67e22;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px auto 0 auto;
            display: block;
            font-weight: bold;
            transition: background 0.2s ease;
        }
        .swap-btn:hover {
            background: #d35400;
        }
        .swap{
            color:#e67e22;
        }
        
        /* OPTIMIZED WEBSITE BACKGROUND SETUP */
        .body{
            background-image:url('back2.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
        }
        .switch{
            color:orange;
            font-weight:bold;
            font-size:20px;
        }
        .animation-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            border-radius: 12px;
            padding: 15px;
        }
        /* STABILIZED Animation Keyframes */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10%); }
        }
        .bounce {
            animation: bounce 2s infinite;
        }

        .ai-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            border-radius: 12px;
            padding: 15px;
        }
        @keyframes bounce1 {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10%); }
        }
        .bounce1 {
            animation: bounce1 2s infinite;
        }

        /* RESPONSIVE HEADER HERO ELEMENTS */
        .hero {
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .chat{
            margin-left: 0;
            margin-top: 10px;
            margin-bottom: 10px;
            display: inline-block;
            background:#e67e22;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            text-decoration:none;
            transition: transform 0.2s, background 0.2s;
        }

        @media (min-width: 992px) {
            .chat {
                margin-left: auto;
                order: 2;
            }
            .hero {
                display: grid;
                grid-template-columns: 1fr auto;
                align-items: center;
            }
            .hero h1 { grid-column: 1; }
            .hero p { grid-column: 1; grid-row: 2; }
            .hero a { grid-column: 2; grid-row: 1 / span 2; margin-left: 20px; }
        }

        .ai {
            background: #2575fc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            text-decoration:none;
            transition: transform 0.2s, background 0.2s;
        }
    </style>
</head>
